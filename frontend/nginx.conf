# /api/auth/ 每 IP 限流：平均 5 req/s，突發最多 10，超過回 429
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;
limit_req_status 429;

# 文字類回應（含反代的 /api JSON）壓縮；JPEG 照片本身已壓縮、不在名單內
gzip on;
gzip_vary on;
gzip_comp_level 5;
gzip_min_length 1024;
gzip_types text/css application/javascript application/json image/svg+xml;

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 5m;

    location /api/auth/ {
        limit_req zone=auth_limit burst=10 nodelay;
        proxy_pass http://backend:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # AI 端點可能較慢（主模型卡住 45s 後才換備援模型，兩段最長約 90s），
    # 超時放寬到 150s，避免 nginx 預設 60s 先切斷連線回 502、備援白跑
    location /api/ai/ {
        proxy_pass http://backend:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 150s;
        proxy_send_timeout 150s;
    }

    location /api/ {
        proxy_pass http://backend:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /uploads/ {
        proxy_pass http://backend:3001;
        proxy_set_header Host $host;
    }

    # Vite 產出的 /assets/* 檔名帶 content hash，可安全快取一年免重驗；
    # index.html 與 changelog.json 走下方 location /（不可 immutable，否則收不到新版）
    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    location / {
        try_files $uri /index.html;
    }
}
