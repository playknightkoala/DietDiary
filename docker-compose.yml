services:
  backend:
    build: ./backend
    environment:
      - JWT_SECRET=${JWT_SECRET:-please-change-this-secret}
      # Gmail SMTP：SMTP_USER 填 Gmail、SMTP_PASS 填應用程式密碼（非登入密碼）
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-}
      # 此信箱對應的帳號自動成為管理者（後台的初始管理員）
      - ADMIN_EMAIL=${ADMIN_EMAIL:-}
      # 對外網址（帳號開通完成通知信會用到）
      - APP_URL=${APP_URL:-http://localhost:8080}
      # AI 功能（eland LLM Gateway，LiteLLM，OpenAI 相容）；LLM_TOKEN 未設定時 AI 功能自動停用
      - LLM_TOKEN=${LLM_TOKEN:-}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://eigw.elandai.cloud}
      # 看圖只用 gemma-4-31b（e4b 看圖品質不佳且僅能讀一張，不作視覺備援）；純文字評語用 gemma-4-12b
      # 31b 故障時：評語降級為純文字（12b → e4b）並標示「未參考照片」；OCR 回報稍後再試
      - LLM_OCR_MODEL=${LLM_OCR_MODEL:-gemma-4-31b}
      - LLM_COMMENT_MODEL=${LLM_COMMENT_MODEL:-gemma-4-12b}
      - LLM_COMMENT_FALLBACK_MODEL=${LLM_COMMENT_FALLBACK_MODEL:-gemma-4-e4b}
      # AI 評語是否附上照片（送進視覺模型）。預設 true＝附上貼文全部照片一併參考；
      # 設 false 可退回純文字模式（省視覺模型負載）。
      - LLM_COMMENT_USE_PHOTO=${LLM_COMMENT_USE_PHOTO:-true}
      # 單次模型呼叫逾時（毫秒）；主模型卡住逾時後會換備援模型再試一次
      - LLM_TIMEOUT_MS=${LLM_TIMEOUT_MS:-45000}
      # 送給視覺模型的圖片「總量」上限（bytes）：gateway 實測約 75KB（base64 十萬字元）會 500，超過會自動縮圖
      - LLM_MAX_IMAGE_BYTES=${LLM_MAX_IMAGE_BYTES:-68000}
    volumes:
      - ./docker-data/db:/app/data
      - ./docker-data/uploads:/app/uploads
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped
