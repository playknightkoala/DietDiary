services:
  backend:
    build: ./backend
    environment:
      # 必填：未在 .env 設定時 `docker compose up` 直接報錯，不再 fallback 到可預測的預設秘鑰
      - JWT_SECRET=${JWT_SECRET:?請在 .env 設定 JWT_SECRET（openssl rand -hex 32）}
      # Gmail SMTP：SMTP_USER 填 Gmail、SMTP_PASS 填應用程式密碼（非登入密碼）
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-}
      # 此信箱對應的帳號自動成為管理者（後台的初始管理員）
      - ADMIN_EMAIL=${ADMIN_EMAIL:-}
      # 對外網址（帳號開通完成通知信會用到）
      - APP_URL=${APP_URL:-http://localhost:8080}
      # AI 功能（eland LLM Gateway，LiteLLM，OpenAI 相容）；LLM_TOKEN 未設定時 AI 功能自動停用
      - LLM_TOKEN=${LLM_TOKEN:-}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://eigw.elandai.cloud}
      # 記錄餐點時看單張照片（判份數＋寫敘述）只用 gemma-4-31b（e4b 看圖品質不佳且僅能讀一張）
      # 純文字 AI 評語用 gemma-4-12b，整批故障時降級到 gemma-4-e4b（皆純文字，不看圖）
      - LLM_OCR_MODEL=${LLM_OCR_MODEL:-gemma-4-31b}
      - LLM_COMMENT_MODEL=${LLM_COMMENT_MODEL:-gemma-4-12b}
      - LLM_COMMENT_FALLBACK_MODEL=${LLM_COMMENT_FALLBACK_MODEL:-gemma-4-e4b}
      # 單次模型呼叫逾時（毫秒）；主模型卡住逾時後會換備援模型再試一次
      - LLM_TIMEOUT_MS=${LLM_TIMEOUT_MS:-45000}
      # 送給視覺模型的單張照片上限（bytes）：gateway 實測約 75KB（base64 十萬字元）會 500，超過會自動縮圖
      - LLM_MAX_IMAGE_BYTES=${LLM_MAX_IMAGE_BYTES:-68000}
      # Tavily 網路搜尋（AI 查證／外食營養標示）；未設定時搜尋相關功能自動停用，主功能不受影響
      - TAVILY_API_KEY=${TAVILY_API_KEY:-}
      # 本地每月額度閘門（免費方案 1,000 credits/月，預設 950 留緩衝；達到後當月停用搜尋）
      - TAVILY_MONTHLY_BUDGET=${TAVILY_MONTHLY_BUDGET:-950}
      # 共用菜色知識庫（embedding 參考）總開關：預設關閉；記憶體吃緊時可一鍵關掉，關閉時 OCR 照舊
      - AI_KB_ENABLED=${AI_KB_ENABLED:-false}
      # 外部 embedding 服務位址（文字＋圖片向量）；未設定時知識庫自動停用
      - AI_EMBED_URL=${AI_EMBED_URL:-}
    volumes:
      - ./docker-data/db:/app/data
      - ./docker-data/uploads:/app/uploads
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

  # 共用知識庫的 embedding 服務（文字＋圖片向量）。以 profile 隔離：
  #   - 平時 `docker compose up -d` 不會啟動它（不佔記憶體）
  #   - 要用知識庫時：`docker compose --profile embed up -d`
  # 啟用後把 backend 的環境設成 AI_KB_ENABLED=true、AI_EMBED_URL=http://embedder:8900（同網路內名稱）
  embedder:
    build: ./embedding-service
    profiles: ["embed"]
    environment:
      - FASTEMBED_CACHE_PATH=/models
    volumes:
      - embed-models:/models   # 模型快取，避免每次重啟重新下載
    restart: unless-stopped

volumes:
  embed-models:
